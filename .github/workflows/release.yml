name: release

# Tag-driven release. A tag can never publish anything that fails CI: the `verify` job
# reuses the full ci.yml (build + test on all OSes + every gate) and every downstream job
# depends on it. Versions are taken straight from the tag (vX.Y.Z -> X.Y.Z); a tag with a
# prerelease suffix (vX.Y.Z-rc.1) flows through to a prerelease NuGet package + GitHub release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  NUGET_XMLDOC_MODE: skip
  # Opt into Node 24 ahead of the runner default so credential-handling actions do
  # not emit Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Full CI must be green before anything is packed/published.
  verify:
    name: Verify (reuse CI)
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  pack:
    name: Pack
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            # workflow_dispatch with no tag: fall back to the static prefix + run number so a
            # manual run still produces a uniquely-versioned, clearly-prerelease set.
            ver="0.1.0-manual.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${ver}"

      - name: Restore
        run: dotnet restore DotBoxD.Packages.slnx

      - name: Build
        run: dotnet build DotBoxD.Packages.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: >-
          dotnet pack DotBoxD.Packages.slnx -c Release --no-build
          -o artifacts/packages
          -p:Version=${{ steps.version.outputs.version }}

      - name: Check package metadata
        shell: pwsh
        run: |
          ./eng/scripts/check-package-metadata.ps1 `
            -PackageDirectory artifacts/packages `
            -ExpectedVersion '${{ steps.version.outputs.version }}'

      - name: Check package consumer smoke
        shell: pwsh
        run: ./eng/scripts/check-package-consumer-smoke.ps1 -PackageDirectory artifacts/packages -Configuration Release

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 30

  attest:
    name: Attest provenance
    needs: pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: artifacts/packages

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg

  publish:
    name: Publish to NuGet.org
    needs: [pack, attest]
    runs-on: ubuntu-latest
    # Only ever publish from the canonical repo on a real version tag. Never from forks,
    # PRs, branches, or workflow_dispatch.
    if: github.event_name == 'push' && github.repository == 'JKamsker/DotBoxD' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: artifacts/packages

      # NuGet API key is fetched from Bitwarden Secrets Manager (same setup as the original
      # ShaRPC repo). The repo provides the BW_ACCESS_TOKEN secret; the access token only
      # lives on the canonical JKamsker/DotBoxD repo, so forks/PRs cannot publish.
      - name: Fetch NuGet API key from Bitwarden
        uses: bitwarden/sm-action@14f92f1d294ae3c2b6a3845d389cd2c318b0dfd8 # v2.2.0
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            265b2fb6-2cf0-4859-9bc8-b24c00ab4378 > NUGET_API_KEY

      - name: Push to NuGet.org
        run: >-
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  github-release:
    name: GitHub release
    needs: [pack, attest]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: artifacts/packages

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          # A tag containing '-' (e.g. v1.2.3-rc.1) is a prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
