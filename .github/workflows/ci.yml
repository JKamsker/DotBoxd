name: ci

# Continuous integration: builds + tests on the validated OSes, runs the carried
# security/quality gate scripts, and publishes main-branch prerelease NuGet packages
# only after those checks pass. Also exposed as a reusable workflow so release.yml can
# require a full green CI run before a tagged stable/prerelease release is allowed to publish.

on:
  push:
    branches: [main, 'release/**', 'integration/**']
  pull_request:
  workflow_dispatch:
  workflow_call:

# Cancel superseded runs on the same ref so a fresh push doesn't keep stale CI alive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  NUGET_XMLDOC_MODE: skip
  # Opt into Node 24 ahead of the runner default so credential-handling actions do
  # not emit Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Warnings-as-errors and other CI-only behaviour key off GITHUB_ACTIONS (already 'true'
  # on hosted runners). Listed here for clarity.
  CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # ubuntu + windows are the validated CI targets. macOS is intentionally excluded for now:
        # several transport tests use .NET named pipes, which are emulated over Unix domain sockets on
        # macOS with different exception/timing semantics, so they are not yet reliable there. Tracked
        # in docs/architecture/follow-up-issues.md.
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # Test projects span net8.0/net9.0/net10.0; install all three runtimes/SDKs so
          # `dotnet test` can run each project on its target framework. global.json pins the
          # build SDK (10.0.x, rollForward latestFeature).
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore DotBoxD.slnx

      - name: Build
        run: dotnet build DotBoxD.slnx -c Release --no-restore

      - name: Test
        shell: pwsh
        timeout-minutes: 30
        # Run test projects sequentially rather than `dotnet test DotBoxD.slnx` (all assemblies at
        # once): the sandbox's wall-clock deadline/quota tests can flip to Timeout under concurrent
        # multi-assembly load on shared CI runners. Each project passes reliably on its own.
        #
        # Each project gets one retry on failure. The transport/inbound coverage tests talk over
        # real named pipes / TCP loopback and use generous hang-guard ceilings; on 2-core hosted
        # runners a transient scheduling stall can still trip one of those ceilings. A single retry
        # absorbs that transient timing flake, while a genuinely broken test fails both attempts.
        # Retries are surfaced as CI warnings so flakiness stays visible rather than silently masked.
        run: |
          $projects = @(
            'tests/DotBoxD.Architecture.Tests/DotBoxD.Architecture.Tests.csproj',
            'tests/DotBoxD.Services.SourceGenerator.Tests/DotBoxD.Services.SourceGenerator.Tests.csproj',
            'tests/DotBoxD.Services.Tests/DotBoxD.Services.Tests.csproj',
            'tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj',
            'tests/DotBoxD.Plugins.Generated.Tests/DotBoxD.Plugins.Generated.Tests.csproj',
            'samples/GameServer/Examples.GameServer.Plugin.Tests/Examples.GameServer.Plugin.Tests.csproj',
            'tools/AgentQueue/tests/AgentQueue.Tests/AgentQueue.Tests.csproj'
          )
          $failed = $false
          foreach ($p in $projects) {
            $name = Split-Path $p -LeafBase
            $passed = $false
            foreach ($attempt in 1..2) {
              Write-Host "::group::dotnet test $name (attempt $attempt)"
              dotnet test $p -c Release --no-build `
                --logger "trx;LogFileName=$name.trx" `
                --results-directory artifacts/test-results `
                --blame-hang `
                --blame-hang-timeout 5m `
                --blame-hang-dump-type mini
              $code = $LASTEXITCODE
              Write-Host "::endgroup::"
              if ($code -eq 0) { $passed = $true; break }
              if ($attempt -eq 1) {
                Write-Host "::warning::$name failed on attempt 1 (exit $code); retrying once to absorb a transient CI timing flake."
              }
            }
            if (-not $passed) { $failed = $true }
          }
          if ($failed) { throw "One or more test projects failed after retry." }

      - name: GameServer example smoke
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./eng/scripts/check-docs-smoke.ps1 -Configuration Release

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results/**/*
          if-no-files-found: ignore
          retention-days: 7

  gates:
    name: Security & quality gates
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Build-independent static gates run first so a file-length, layout, rebrand,
      # spec-manifest, API-baseline, or workflow-security violation fails in seconds
      # instead of only after the multi-minute restore + build below.
      - name: Rebrand completeness
        shell: pwsh
        run: ./eng/scripts/check-rebrand-complete.ps1

      - name: C# file length / layout limits
        shell: pwsh
        run: ./eng/scripts/check-csharp-file-lines.ps1

      - name: C# folder layout limits
        shell: pwsh
        run: ./eng/scripts/check-csharp-folder-layout.ps1

      - name: Spec manifest integrity
        shell: pwsh
        run: ./eng/scripts/check-spec-manifest.ps1

      - name: Public API baseline
        shell: pwsh
        run: ./eng/scripts/check-api-compat-baseline.ps1

      - name: Release workflow security
        shell: pwsh
        run: ./eng/scripts/check-release-workflow-security.ps1

      - name: Release readiness
        shell: pwsh
        run: ./eng/scripts/check-release-readiness.ps1 -RequireComplete

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore DotBoxD.slnx

      # Enforce .editorconfig formatting. Whitespace-only so the gate stays decoupled
      # from the analyzer layer (style/analyzer rules are enforced by the build itself
      # via EnforceCodeStyleInBuild + warnings-as-errors).
      - name: Formatting (dotnet format)
        run: dotnet format whitespace DotBoxD.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build DotBoxD.slnx -c Release --no-restore

      - name: Security-boundary required tests
        shell: pwsh
        run: |
          ./eng/scripts/run-required-tests.ps1 `
            -Project tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj `
            -Configuration Release `
            -NoBuild `
            -RequiredFullyQualifiedNameContains @(
              "SafeFileSystemTests",
              "SafeFileSystemReparsePointTests",
              "FileExtensionPolicyTests",
              "PathUriLiteralValidationTests",
              "CompiledArtifactGuardTests",
              "CompiledAsyncCapabilityParityTests",
              "CompiledAsyncSynchronizationContextParityTests",
              "CompiledRuntimeQuotaTests",
              "CompiledCacheAuditTests",
              "CompiledCacheConcurrencyTests",
              "CompiledCacheEntrypointTests",
              "CompiledCacheMetadataTests",
              "CompiledCacheRootGuardTests",
              "CompiledCacheTests",
              "CacheKeyIdentityTests",
              "VerifierAttackMatrixTests",
              "VerifierDocumentedAttackMatrixTests",
              "VerifierLoopMeteringTests",
              "VerifierManifestIdentityTests",
              "VerifierMemberSignatureTests",
              "BindingRegistryHardeningTests",
              "WorkerIsolationTests",
              "WorkerResultHardeningTests",
              "JsonApiSurfaceTests",
              "PublicModelImmutabilityTests",
              "PluginPackageValidationTests",
              "PluginRevocationTests",
              "PinnedHttpTransportTests",
              "DifferentialFuzzTests"
            )

      # Collect coverage from the two suites that exercise the bulk of the shipping
      # code, then enforce the line-coverage floor (.config/code-enforcer/coverage.json).
      - name: Coverage threshold
        shell: pwsh
        run: |
          # Native `dotnet test` failures do not stop a pwsh script on their own, so check
          # $LASTEXITCODE after each run. Otherwise a crashed/failed suite that still emitted
          # partial coverage could let check-coverage.ps1 pass while a suite never contributed.
          dotnet test tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj -c Release --no-build `
            --collect "XPlat Code Coverage" --results-directory artifacts/coverage
          if ($LASTEXITCODE -ne 0) { throw "Kernels coverage test run failed (exit $LASTEXITCODE)." }
          dotnet test tests/DotBoxD.Services.Tests/DotBoxD.Services.Tests.csproj -c Release --no-build `
            --collect "XPlat Code Coverage" --results-directory artifacts/coverage
          if ($LASTEXITCODE -ne 0) { throw "Services coverage test run failed (exit $LASTEXITCODE)." }
          ./eng/scripts/check-coverage.ps1 -CoverageDirectory artifacts/coverage

      - name: Docs & examples smoke
        shell: pwsh
        run: ./eng/scripts/check-docs-smoke.ps1 -Configuration Release

  pack-packages:
    name: Pack NuGet packages
    needs: [build-test, gates]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          [xml] $props = Get-Content -Raw Directory.Build.props
          $versionPrefix = [string] $props.Project.PropertyGroup.VersionPrefix
          if ([string]::IsNullOrWhiteSpace($versionPrefix)) {
            throw "Directory.Build.props must declare VersionPrefix."
          }

          $version = "$versionPrefix-ci.$env:GITHUB_RUN_NUMBER"
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved package version: $version"

      - name: Restore
        run: dotnet restore DotBoxD.slnx

      - name: Build
        run: dotnet build DotBoxD.slnx -c $CONFIGURATION --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: >-
          dotnet pack DotBoxD.slnx -c $CONFIGURATION --no-build
          -o artifacts/packages
          -p:Version=${{ steps.version.outputs.version }}

      - name: Check package metadata
        shell: pwsh
        run: |
          ./eng/scripts/check-package-metadata.ps1 `
            -PackageDirectory artifacts/packages `
            -ExpectedVersion '${{ steps.version.outputs.version }}' `
            -AllowPrereleaseVersions

      - name: Check package consumer smoke
        shell: pwsh
        run: ./eng/scripts/check-package-consumer-smoke.ps1 -PackageDirectory artifacts/packages -Configuration $env:CONFIGURATION

      - name: Upload NuGet packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 30

  publish-nuget:
    name: Publish to NuGet.org
    needs: pack-packages
    runs-on: ubuntu-latest
    # Publish only from the canonical repo on a push to main: never from PRs,
    # forks, release branches, workflow_dispatch, or reusable workflow calls.
    if: >-
      github.event_name == 'push' &&
      github.repository == 'JKamsker/DotBoxD' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Download NuGet packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: artifacts/packages

      # NuGet API key is fetched from Bitwarden Secrets Manager. The BW_ACCESS_TOKEN
      # secret only lives on the canonical JKamsker/DotBoxD repository, and the
      # job condition above prevents untrusted refs from reaching this step.
      - name: Fetch NuGet API key from Bitwarden
        uses: bitwarden/sm-action@f1de238fc00c738c56140796018be9084c2b5d21 # v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            265b2fb6-2cf0-4859-9bc8-b24c00ab4378 > NUGET_API_KEY

      - name: Push to NuGet.org
        run: >-
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
          && echo "Published version: ${{ needs.pack-packages.outputs.version }}"
