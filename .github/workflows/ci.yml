              "InvokeAsyncCaptureBagRuntimeTests",
              "InvokeAsyncMapReturnRuntimeTests",
              "InvokeAsyncObjectInitializerOrderTests",
              "InvokeAsyncInstallCancellationRuntimeTests",
              "HostServiceBindingContractTests",
              "PluginAnalyzerForbiddenApiReachabilityTests",
              "PluginAnalyzerForbiddenApiConstructorReachabilityTests",
              "PluginAnalyzerKernelMethodTests",
              "PluginAnalyzerKernelMethodProjectionRegressionTests",
              "PluginAnalyzerKernelMethodSurpriseRegressionTests",
