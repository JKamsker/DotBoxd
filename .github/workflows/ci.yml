name: CI

on:
  push:
    branches: [ main, master, 'release/**' ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build-test-pack:
    name: Build, Test, Pack (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SafeIR.slnx --locked-mode

      - name: Build
        run: dotnet build SafeIR.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SafeIR.slnx --configuration Release --no-build

      - name: Security boundary tests
        run: dotnet test tests/SafeIR.Tests/SafeIR.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~SafeFileSystemTests|FullyQualifiedName~SafeFileSystemReparsePointTests|FullyQualifiedName~FileExtensionPolicyTests|FullyQualifiedName~PathUriLiteralValidationTests|FullyQualifiedName~CompiledArtifactGuardTests|FullyQualifiedName~CompiledRuntimeQuotaTests|FullyQualifiedName~VerifierAttackMatrixTests|FullyQualifiedName~VerifierLoopMeteringTests|FullyQualifiedName~BindingRegistryHardeningTests|FullyQualifiedName~PluginPackageValidationTests|FullyQualifiedName~PluginRevocationTests|FullyQualifiedName~PinnedHttpTransportTests|FullyQualifiedName~DifferentialFuzzTests"

      - name: Docs and examples smoke
        shell: pwsh
        run: ./scripts/check-docs-smoke.ps1 -Configuration Release

      - name: Check C# file lengths
        shell: pwsh
        run: ./scripts/check-csharp-file-lines.ps1

      - name: Check spec manifest
        shell: pwsh
        run: ./scripts/check-spec-manifest.ps1

      - name: Report release readiness checklist
        shell: pwsh
        run: ./scripts/check-release-readiness.ps1

      - name: Enforce release readiness checklist
        if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: ./scripts/check-release-readiness.ps1 -RequireComplete

      - name: Pack
        run: dotnet pack SafeIR.slnx --configuration Release --no-build --output artifacts/packages

      - name: Check package metadata
        shell: pwsh
        run: ./scripts/check-package-metadata.ps1 -PackageDirectory artifacts/packages -AllowPrereleaseVersions

      - name: Enforce stable package versions
        if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: ./scripts/check-package-metadata.ps1 -PackageDirectory artifacts/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
