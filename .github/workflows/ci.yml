name: CI

on:
  push:
    branches: [ main, master, 'release/**' ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build-test-pack:
    name: Build, Test, Pack (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SafeIR.slnx --locked-mode

      - name: Build
        run: dotnet build SafeIR.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SafeIR.slnx --configuration Release --no-build

      - name: Security boundary tests
        shell: pwsh
        run: |
          ./scripts/run-required-tests.ps1 `
            -Project tests/SafeIR.Tests/SafeIR.Tests.csproj `
            -Configuration Release `
            -NoBuild `
            -RequiredFullyQualifiedNameContains @(
              "SafeFileSystemTests",
              "SafeFileSystemReparsePointTests",
              "FileExtensionPolicyTests",
              "PathUriLiteralValidationTests",
              "CompiledArtifactGuardTests",
              "CompiledRuntimeQuotaTests",
              "CompiledCacheAuditTests",
              "CompiledCacheConcurrencyTests",
              "CompiledCacheEntrypointTests",
              "CompiledCacheMetadataTests",
              "CompiledCacheRootGuardTests",
              "CompiledCacheTests",
              "CacheKeyIdentityTests",
              "VerifierAttackMatrixTests",
              "VerifierDocumentedAttackMatrixTests",
              "VerifierLoopMeteringTests",
              "VerifierManifestIdentityTests",
              "VerifierMemberSignatureTests",
              "BindingRegistryHardeningTests",
              "WorkerIsolationTests",
              "WorkerResultHardeningTests",
              "JsonApiSurfaceTests",
              "PublicModelImmutabilityTests",
              "PluginPackageValidationTests",
              "PluginRevocationTests",
              "PinnedHttpTransportTests",
              "DifferentialFuzzTests"
            )

      - name: Docs and examples smoke
        shell: pwsh
        run: ./scripts/check-docs-smoke.ps1 -Configuration Release

      - name: Check C# file lengths
        shell: pwsh
        run: ./scripts/check-csharp-file-lines.ps1

      - name: Check spec manifest
        shell: pwsh
        run: ./scripts/check-spec-manifest.ps1

      - name: Check release workflow security
        shell: pwsh
        run: ./scripts/check-release-workflow-security.ps1

      - name: Check public API baseline
        shell: pwsh
        run: ./scripts/check-api-compat-baseline.ps1

      - name: Report release readiness checklist
        shell: pwsh
        run: ./scripts/check-release-readiness.ps1

      - name: Enforce release readiness checklist
        if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: ./scripts/check-release-readiness.ps1 -RequireComplete

      - name: Pack
        shell: pwsh
        run: |
          Remove-Item artifacts/packages/*.nupkg -Force -ErrorAction SilentlyContinue
          dotnet pack SafeIR.slnx --configuration Release --no-build --output artifacts/packages

      - name: Check package metadata
        shell: pwsh
        run: ./scripts/check-package-metadata.ps1 -PackageDirectory artifacts/packages -AllowPrereleaseVersions

      - name: Enforce stable package versions
        if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $metadataArgs = @{
            PackageDirectory = "artifacts/packages"
            AllowedPrereleasePackageIds = @("SafeIR.Transport.Ipc.ShaRpc")
          }
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $metadataArgs.ExpectedVersion = $env:GITHUB_REF_NAME
          } elseif ($env:GITHUB_REF -like "refs/heads/release/*") {
            $releaseVersion = $env:GITHUB_REF.Substring("refs/heads/release/".Length)
            $metadataArgs.ExpectedVersion = $releaseVersion
          }

          ./scripts/check-package-metadata.ps1 @metadataArgs

      - name: Attest package artifacts
        if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: artifacts/packages/*.nupkg

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: packages-${{ matrix.os }}
          path: |
            artifacts/packages/*.nupkg
          if-no-files-found: error
