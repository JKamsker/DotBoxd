name: ci

# Continuous integration: builds + tests on the validated OSes, runs the carried
# security/quality gate scripts, and publishes main-branch prerelease NuGet packages
# only after those checks pass. Also exposed as a reusable workflow so release.yml can
# require a full green CI run before a tagged stable/prerelease release is allowed to publish.

on:
  push:
    branches: [main, 'release/**', 'integration/**']
  pull_request:
  workflow_dispatch:
  workflow_call:

# Cancel superseded runs on the same ref so a fresh push doesn't keep stale CI alive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  NUGET_XMLDOC_MODE: skip
  # Opt into Node 24 ahead of the runner default so credential-handling actions do
  # not emit Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Warnings-as-errors and other CI-only behaviour key off GITHUB_ACTIONS (already 'true'
  # on hosted runners). Listed here for clarity.
  CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # ubuntu + windows are the validated CI targets. macOS is intentionally excluded for now:
        # several transport tests use .NET named pipes, which are emulated over Unix domain sockets on
        # macOS with different exception/timing semantics, so they are not yet reliable there. Tracked
        # in docs/architecture/follow-up-issues.md.
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # Test projects span net8.0/net9.0/net10.0; install all three runtimes/SDKs so
          # `dotnet test` can run each project on its target framework. global.json pins the
          # build SDK (10.0.x, rollForward latestFeature).
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore DotBoxD.slnx

      - name: Build
        run: dotnet build DotBoxD.slnx -c Release --no-restore

      - name: GameServer example smoke
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./eng/scripts/check-docs-smoke.ps1 -Configuration Release

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.suite }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suite: kernels-allocation-regression
            projects: tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj
            prebuild: samples/GameServer/Examples.GameServer.Server/Examples.GameServer.Server.csproj
            filter: FullyQualifiedName~DotBoxD.Kernels.Tests.Plugins.Regression.InterpreterValues.Fix_PAL_0043_Tests
          - os: ubuntu-latest
            suite: kernels-remainder
            projects: tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj
            prebuild: samples/GameServer/Examples.GameServer.Server/Examples.GameServer.Server.csproj
            filter: FullyQualifiedName!~DotBoxD.Kernels.Tests.Plugins.Regression.InterpreterValues.Fix_PAL_0043_Tests
          - os: ubuntu-latest
            suite: services
            projects: |
              tests/DotBoxD.Services.SourceGenerator.Tests/DotBoxD.Services.SourceGenerator.Tests.csproj
              tests/DotBoxD.Services.Tests/DotBoxD.Services.Tests.csproj
            prebuild: ''
            filter: ''
          - os: ubuntu-latest
            suite: integration-smoke
            projects: |
              tests/DotBoxD.Architecture.Tests/DotBoxD.Architecture.Tests.csproj
              tests/DotBoxD.Plugins.Generated.Tests/DotBoxD.Plugins.Generated.Tests.csproj
              samples/GameServer/Examples.GameServer.Plugin.Tests/Examples.GameServer.Plugin.Tests.csproj
              tools/AgentQueue/tests/AgentQueue.Tests/AgentQueue.Tests.csproj
            prebuild: ''
            filter: ''
          - os: windows-latest
            suite: kernels-allocation-regression
            projects: tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj
            prebuild: samples/GameServer/Examples.GameServer.Server/Examples.GameServer.Server.csproj
            filter: FullyQualifiedName~DotBoxD.Kernels.Tests.Plugins.Regression.InterpreterValues.Fix_PAL_0043_Tests
          - os: windows-latest
            suite: kernels-remainder
            projects: tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj
            prebuild: samples/GameServer/Examples.GameServer.Server/Examples.GameServer.Server.csproj
            filter: FullyQualifiedName!~DotBoxD.Kernels.Tests.Plugins.Regression.InterpreterValues.Fix_PAL_0043_Tests
          - os: windows-latest
            suite: services
            projects: |
              tests/DotBoxD.Services.SourceGenerator.Tests/DotBoxD.Services.SourceGenerator.Tests.csproj
              tests/DotBoxD.Services.Tests/DotBoxD.Services.Tests.csproj
            prebuild: ''
            filter: ''
          - os: windows-latest
            suite: integration-smoke
            projects: |
              tests/DotBoxD.Architecture.Tests/DotBoxD.Architecture.Tests.csproj
              tests/DotBoxD.Plugins.Generated.Tests/DotBoxD.Plugins.Generated.Tests.csproj
              samples/GameServer/Examples.GameServer.Plugin.Tests/Examples.GameServer.Plugin.Tests.csproj
              tools/AgentQueue/tests/AgentQueue.Tests/AgentQueue.Tests.csproj
            prebuild: ''
            filter: ''

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore DotBoxD.slnx

      - name: Build test prerequisites
        if: ${{ matrix.prebuild != '' }}
        shell: pwsh
        run: |
          $projectText = @"
          ${{ matrix.prebuild }}
          "@
          $projects = $projectText -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_.Length -gt 0 }
          foreach ($project in $projects) {
            dotnet build $project -c Release --no-restore
            if ($LASTEXITCODE -ne 0) {
              throw "Prerequisite build failed for $project (exit $LASTEXITCODE)."
            }
          }

      - name: Test ${{ matrix.suite }}
        shell: pwsh
        # Test suites run in separate jobs rather than concurrent processes on one runner:
        # the kernels deadline/quota tests are wall-clock-sensitive on 2-core hosted runners.
        run: |
          $projectText = @"
          ${{ matrix.projects }}
          "@
          $projects = $projectText -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_.Length -gt 0 }
          $arguments = @{
            Projects = $projects
            Configuration = 'Release'
            SuiteName = '${{ matrix.suite }}'
            NoRestore = $true
          }
          $filter = '${{ matrix.filter }}'
          if (-not [string]::IsNullOrWhiteSpace($filter)) {
            $arguments.Filter = $filter
          }

          ./eng/scripts/run-test-projects.ps1 @arguments

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.suite }}
          path: artifacts/test-results/**/*
          if-no-files-found: ignore
          retention-days: 7

  build-test:
    name: Build & Test (${{ matrix.os }})
    needs: [build, test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Verify build and test matrix
        shell: pwsh
        run: |
          $buildResult = '${{ needs.build.result }}'
          $testResult = '${{ needs.test.result }}'
          if ($buildResult -ne 'success' -or $testResult -ne 'success') {
            throw "Build/test matrix did not pass. build=$buildResult test=$testResult"
          }

          Write-Host "Build/test matrix passed for ${{ matrix.os }}."

  gates:
    name: Security & quality gates
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Build-independent static gates run first so a file-length, layout, rebrand,
      # spec-manifest, API-baseline, or workflow-security violation fails in seconds
      # instead of only after the multi-minute restore + build below.
      - name: Rebrand completeness
        shell: pwsh
        run: ./eng/scripts/check-rebrand-complete.ps1

      - name: C# file length / layout limits
        shell: pwsh
        run: ./eng/scripts/check-csharp-file-lines.ps1

      - name: C# folder layout limits
        shell: pwsh
        run: ./eng/scripts/check-csharp-folder-layout.ps1

      - name: Spec manifest integrity
        shell: pwsh
        run: ./eng/scripts/check-spec-manifest.ps1

      - name: Public API baseline
        shell: pwsh
        run: ./eng/scripts/check-api-compat-baseline.ps1

      - name: Release workflow security
        shell: pwsh
        run: ./eng/scripts/check-release-workflow-security.ps1

      - name: Release readiness
        shell: pwsh
        run: ./eng/scripts/check-release-readiness.ps1 -RequireComplete

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore DotBoxD.slnx

      # Enforce .editorconfig formatting. Whitespace-only so the gate stays decoupled
      # from the analyzer layer (style/analyzer rules are enforced by the build itself
      # via EnforceCodeStyleInBuild + warnings-as-errors).
      - name: Formatting (dotnet format)
        run: dotnet format whitespace DotBoxD.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build DotBoxD.slnx -c Release --no-restore

      - name: Security-boundary required tests
        shell: pwsh
        run: |
          ./eng/scripts/run-required-tests.ps1 `
            -Project tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj `
            -Configuration Release `
            -NoBuild `
            -RequiredFullyQualifiedNameContains @(
