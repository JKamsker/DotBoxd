      - name: Docs & examples smoke
        shell: pwsh
        run: ./eng/scripts/check-docs-smoke.ps1 -Configuration Release

  coverage:
    name: Coverage threshold
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore DotBoxD.slnx

      - name: Build coverage prerequisites
        run: dotnet build samples/GameServer/Examples.GameServer.Server/Examples.GameServer.Server.csproj -c Release --no-restore

      # Collect coverage from the two suites that exercise the bulk of the shipping
      # code, then enforce the line-coverage floor (.config/code-enforcer/coverage.json).
      - name: Coverage threshold
        shell: pwsh
        run: |
          # Native `dotnet test` failures do not stop a pwsh script on their own, so check
          # $LASTEXITCODE after each run. Otherwise a crashed/failed suite that still emitted
          # partial coverage could let check-coverage.ps1 pass while a suite never contributed.
          dotnet test tests/DotBoxD.Kernels.Tests/DotBoxD.Kernels.Tests.csproj -c Release --no-restore `
            --collect "XPlat Code Coverage" --results-directory artifacts/coverage
          if ($LASTEXITCODE -ne 0) { throw "Kernels coverage test run failed (exit $LASTEXITCODE)." }
          dotnet test tests/DotBoxD.Services.Tests/DotBoxD.Services.Tests.csproj -c Release --no-restore `
            --collect "XPlat Code Coverage" --results-directory artifacts/coverage
          if ($LASTEXITCODE -ne 0) { throw "Services coverage test run failed (exit $LASTEXITCODE)." }
          ./eng/scripts/check-coverage.ps1 -CoverageDirectory artifacts/coverage

  pack-packages:
    name: Pack NuGet packages
    needs: [build-test, gates, coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          [xml] $props = Get-Content -Raw Directory.Build.props
          $versionPrefix = [string] $props.Project.PropertyGroup.VersionPrefix
          if ([string]::IsNullOrWhiteSpace($versionPrefix)) {
            throw "Directory.Build.props must declare VersionPrefix."
          }

          $version = "$versionPrefix-ci.$env:GITHUB_RUN_NUMBER"
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved package version: $version"

      - name: Restore
        run: dotnet restore DotBoxD.Packages.slnx

      - name: Build
        run: dotnet build DotBoxD.Packages.slnx -c $CONFIGURATION --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: >-
          dotnet pack DotBoxD.Packages.slnx -c $CONFIGURATION --no-build
          -o artifacts/packages
          -p:Version=${{ steps.version.outputs.version }}

      - name: Check package metadata
        shell: pwsh
        run: |
          ./eng/scripts/check-package-metadata.ps1 `
            -PackageDirectory artifacts/packages `
            -ExpectedVersion '${{ steps.version.outputs.version }}' `
            -AllowPrereleaseVersions

      - name: Check package consumer smoke
        shell: pwsh
        run: ./eng/scripts/check-package-consumer-smoke.ps1 -PackageDirectory artifacts/packages -Configuration $env:CONFIGURATION

      - name: Upload NuGet packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 30

  publish-nuget:
    name: Publish to NuGet.org
    needs: pack-packages
    runs-on: ubuntu-latest
    # Publish only from the canonical repo on a push to main: never from PRs,
    # forks, release branches, workflow_dispatch, or reusable workflow calls.
    if: >-
      github.event_name == 'push' &&
      github.repository == 'JKamsker/DotBoxD' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Download NuGet packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages
          path: artifacts/packages

      # NuGet API key is fetched from Bitwarden Secrets Manager. The BW_ACCESS_TOKEN
      # secret only lives on the canonical JKamsker/DotBoxD repository, and the
      # job condition above prevents untrusted refs from reaching this step.
      - name: Fetch NuGet API key from Bitwarden
        uses: bitwarden/sm-action@f1de238fc00c738c56140796018be9084c2b5d21 # v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            265b2fb6-2cf0-4859-9bc8-b24c00ab4378 > NUGET_API_KEY

      - name: Push to NuGet.org
        run: >-
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
          && echo "Published version: ${{ needs.pack-packages.outputs.version }}"
