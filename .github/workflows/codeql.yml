name: codeql

# CodeQL static analysis for C#. Manual build mode is used on purpose: autobuild struggles
# with this repo's multiple target frameworks + source generators, so we drive the build
# ourselves after installing the matching SDKs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 03:42 UTC.
    - cron: '42 3 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: manual

      - name: Build
        run: dotnet build DotBoxD.slnx -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:csharp'
          output: codeql-results
          # This private repository does not currently have GitHub code scanning enabled.
          # Keep CodeQL extraction/query failures in CI, and publish the SARIF as a normal artifact.
          upload: never

      - name: Upload CodeQL SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-sarif-csharp
          path: codeql-results/**/*.sarif
          if-no-files-found: warn
          retention-days: 7
