name: docs

# Builds the DocFX documentation site (conceptual docs + tutorials + examples + generated
# API reference) and publishes it to the `gh-pages` branch on pushes to main.
#
# GitHub Pages coexistence: this repo's benchmarks workflow (benchmarks.yml) auto-pushes
# BenchmarkDotNet history to `gh-pages` under `dev/bench/**` via github-action-benchmark.
# We therefore publish the docs site to the SAME branch root and use `clean-exclude` to
# preserve `dev/bench/**`. Do NOT switch this to actions/deploy-pages: that would flip the
# Pages source to "GitHub Actions" and stop serving the branch, breaking the benchmark charts.
#
# One-time setup (repo admin): Settings -> Pages -> "Deploy from a branch" -> gh-pages / (root).
# The site is then served at https://jkamsker.github.io/DotBoxD/ and benchmarks at
# https://jkamsker.github.io/DotBoxD/dev/bench/.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - '**/*.csproj'
      - 'docfx.json'
      - 'filterConfig.yml'
      - 'toc.yml'
      - 'index.md'
      - 'api/index.md'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'docfx.json'
      - 'filterConfig.yml'
      - 'toc.yml'
      - 'index.md'
      - 'api/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & deploy DocFX site
    runs-on: ubuntu-latest
    permissions:
      # Needed only for the deploy step, which pushes the built site to the gh-pages branch.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # docfx builds the library projects for API metadata; they span netstandard2.0/2.1
          # and net10.0. global.json pins the build SDK (10.0.x, rollForward latestFeature).
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore .NET tools (docfx)
        run: dotnet tool restore

      - name: Build documentation site
        # Runs both the `metadata` (API reference) and `build` (site) phases from docfx.json.
        run: dotnet docfx docfx.json

      - name: Disable Jekyll on the published site
        run: touch _site/.nojekyll

      - name: Deploy to GitHub Pages (gh-pages branch)
        # Only publish from the canonical repo's main branch; PRs and forks build but do not deploy.
        if: >-
          github.event_name != 'pull_request' &&
          github.ref == 'refs/heads/main' &&
          github.repository == 'JKamsker/DotBoxD'
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          # Preserve BenchmarkDotNet history published by benchmarks.yml.
          clean-exclude: |
            dev/bench/**
          commit-message: 'docs: publish DocFX site for ${{ github.sha }}'
